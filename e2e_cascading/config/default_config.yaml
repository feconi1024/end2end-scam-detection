dataset:
  # CSV manifests with columns: path, label, [transcript]
  # Standard corrected split: labels come from TeleAntiFraud family prefixes
  # (NEG -> scam, POS -> non_scam), not from tts_fraud / tts_test filenames.
  train_manifest: "TeleAntiFraud-28k/corrected_manifests/train_manifest.csv"
  val_manifest: "TeleAntiFraud-28k/corrected_manifests/val_manifest.csv"
  test_manifest: "TeleAntiFraud-28k/corrected_manifests/test_manifest.csv"

  # Audio loading
  sample_rate: 16000

  # Label names in the manifest
  scam_label: "scam"
  non_scam_label: "non_scam"

model:
  # Hugging Face model identifiers
  whisper_model_name: "openai/whisper-small"
  bert_model_name: "bert-base-multilingual-uncased"

  # Semantic classifier
  num_labels: 2

  # Projector configuration (Whisper encoder -> BERT hidden size)
  projector:
    conv_kernel_size: 3
    conv_stride: 4
    conv_padding: 1
    conv_dilation: 1

  # CTC configuration
  ctc_blank_token_id: 0
  ctc_min_char_freq: 1

  # Iterative freezing configuration
  freeze_epochs: 1        # Phase 1: freeze audio encoder for first N epochs
  audio_unfreeze_num_layers: 4  # Number of top encoder layers to unfreeze

training:
  num_epochs: 10
  batch_size: 4
  learning_rate: 3.0e-5
  weight_decay: 0.01
  lr_after_unfreeze_factor: 0.5
  gradient_accumulation_steps: 8   # effective batch size = 4 * 8 = 32

  ctc_weight: 0.3
  slu_weight: 0.7

  # Training stability
  max_grad_norm: 1.0
  warmup_ratio: 0.05     # 5% of total steps for linear warmup
  mixed_precision: "bf16"

  device: "cuda"   # "cuda" or "cpu"; respects CUDA_VISIBLE_DEVICES on Linux/Slurm
  # Restore normal Linux DataLoader throughput now that CUDA init is deferred
  # until after worker startup and no silent CPU fallback is used.
  num_workers: 1
  prefetch_factor: 1
  persistent_workers: false
  pin_memory: true
  log_interval: 10

  # Checkpoint directory
  output_dir: "e2e_cascading/checkpoints"

