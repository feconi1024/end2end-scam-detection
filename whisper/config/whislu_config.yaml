# Use medium for 96GB; large-v3 often OOMs even on H100-96 with full decoder FT.
model_name: "openai/whisper-medium"

sampling_rate: 16000
language: "zh"
task: "transcribe"

special_tokens: []  # unused with JSON targets
label2token: {}     # unused with JSON targets

lora: {}            # no LoRA when using SML JSON targets

# Train on BOTH Transcript and Intent to ground the model's semantic understanding
train_intent_only: false
include_domain: false               # TeleAntiFraud is single-domain; constant "telephony" adds no signal
domain: "telephony"
max_label_tokens: 448               # hard Whisper decoder budget
max_text_target_tokens: 256         # keep long call transcripts from crowding out the final Intent field

training:
  output_dir: "outputs/whislu"
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  max_eval_samples: 512              # larger, more stable eval subset without full-set generation cost
  num_train_epochs: 3
  learning_rate: 5.0e-5
  weight_decay: 0.01
  warmup_steps: 500
  logging_steps: 50
  save_steps: 2000
  eval_steps: 2000
  evaluation_strategy: "steps"
  save_total_limit: 2
  predict_with_generate: true
  fp16: false
  bf16: true                          # use bf16 on H100 to cut memory (no GradScaler issues)
  generation_max_length: 448          # eval generation budget for the JSON target sequence

inference:
  max_new_tokens: 320                 # enough for capped transcript + trailing intent JSON
  intent_only_max_new_tokens: 8       # only meaningful when train_intent_only=true
