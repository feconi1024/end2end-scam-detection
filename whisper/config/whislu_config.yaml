model_name: "openai/whisper-large-v3"

sampling_rate: 16000

special_tokens: []  # unused with JSON targets
label2token: {}     # unused with JSON targets

lora: {}            # no LoRA when using SML JSON targets

training:
  output_dir: "outputs/whislu"
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 2
  num_train_epochs: 3
  learning_rate: 1.0e-4
  warmup_steps: 500
  logging_steps: 50
  save_steps: 1000
  eval_steps: 1000
  evaluation_strategy: "steps"
  save_total_limit: 2
  predict_with_generate: true
  fp16: false
  generation_max_length: 128

inference:
  max_new_tokens: 128
  intent_only_max_new_tokens: 8
