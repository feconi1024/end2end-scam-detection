model_name: "openai/whisper-small"

sampling_rate: 16000

special_tokens:
  - "<|scam|>"
  - "<|not_scam|>"
  - "<|impersonation|>"
  - "<|investment|>"

label2token:
  scam: "<|scam|>"
  not_scam: "<|not_scam|>"   # alias if used elsewhere
  non_scam: "<|not_scam|>"   # matches TeleAntiFraud-28k CSV labels
  impersonation: "<|impersonation|>"
  investment: "<|investment|>"

lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "v_proj"
  modules_to_save:
    - "embed_tokens"
    - "lm_head"

training:
  output_dir: "outputs/whislu"
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 2
  num_train_epochs: 3
  learning_rate: 1.0e-4
  warmup_steps: 500
  logging_steps: 50
  save_steps: 1000
  eval_steps: 1000
  evaluation_strategy: "steps"
  save_total_limit: 2
  predict_with_generate: true
  fp16: true
  generation_max_length: 128

inference:
  max_new_tokens: 128
  intent_only_max_new_tokens: 8
