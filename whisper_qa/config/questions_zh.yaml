language: "zh"
positive_answer: "是"
negative_answer: "否"
prompt_template: "问题：{question} 答案："

labels:
  scam:
    description: "诈骗、冒充、诱导转账、验证码或其他电信欺诈相关通话"
    questions:
      - "这通电话是否属于诈骗或欺诈行为？"
      - "对方是否在冒充他人、机构或客服来实施诈骗？"
      - "这段通话里是否存在诱导转账、索要验证码或骗取资金的意图？"
      - "这通电话是否带有明显的诈骗、套取信息或财务欺骗风险？"

  non_scam:
    description: "正常、合法、非诈骗的电话沟通"
    questions:
      - "这通电话是否属于正常合法、非诈骗的沟通？"
      - "对方是否没有实施诈骗、冒充或诱导转账？"
      - "这段通话是否更像普通业务联系或正常交流，而不是诈骗？"
      - "这通电话是否可以判断为非诈骗、无明显欺骗意图？"
